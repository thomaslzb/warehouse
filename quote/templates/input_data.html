<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">

    <title>Hello, world!</title>
  </head>
  <body>
         <form role="form" action="" method="post" class=" form-inline">
            {% csrf_token %}
          <div class="form-group form-inline">
            <label for="formGroupExampleInput">Length(CM)</label>
            <input type="text" class="form-control " id="formGroupExampleInput" placeholder="Length input">
          </div>
          <div class="form-group form-inline">
            <label for="formGroupExampleInput2">Width(CM)</label>
            <input type="text" class="form-control " id="formGroupExampleInput2" placeholder="Width input">
          </div>
          <div class="form-group form-inline">
            <label for="formGroupExampleInput2">High(CM)</label>
            <input type="text" class="form-control " id="formGroupExampleInput2" placeholder="High input">
          </div>
          <div class="form-group form-inline">
            <label for="formGroupExampleInput2">Weight(KG)</label>
            <input type="text" class="form-control " id="formGroupExampleInput2" placeholder="Weight input">
          </div>
            <input type="submit" class="btn btn-info" value="Submit Button">
        </form>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  </body>
</html>
