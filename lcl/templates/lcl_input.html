{% extends 'base-menu.html' %}
{% load static %}
{% block content %}
    <div class="container-fluid">
        <div class="row mt">
            <div class="col-lg-12">
                <div class="form-panel">
                      <h4><i class="fa fa-angle-right"></i> LCL Calculation </h4>
                    <hr>
                    <div class=" form">
                        <form class="cmxform form-horizontal style-form" id="commentForm" method="post"
                              action="" >
                            {% csrf_token %}
                            <div class="form-group ">
                                <label for="cname" class="control-label col-lg-1">Volume</label>
                                <div class="col-lg-2">
                                    <input class=" form-control" id="volume" name="volume" minlength="2"
                                           value="{{ user_info.username }}" placeholder="volume" type="text"
                                           oninput="verify_decimal2(this)" required />
                                </div>
                            </div>
                            <div class="form-group ">
                                <label for="cemail" class="control-label col-lg-1">Weight</label>
                                <div class="col-lg-2">
                                    <input class="form-control " id="weight" name="weight"
                                           value="{{ user_info.first_name }}" placeholder="Weight"
                                           type="text" oninput="verify_decimal2(this)" required />
                                </div>
                            </div>
                            <div class="form-group ">
                                <label for="cemail" class="control-label col-lg-1">Pallet Qty.</label>
                                <div class="col-lg-2">
                                    <input class="form-control " id="qty"  name="qty" placeholder="Pallet Qty."
                                           value="{{ user_info.last_name }}" oninput="onlyNumber(this)"  type="text" />
                                </div>
                            </div>
                            <div class="form-group ">
                                <label for="cemail" class="control-label col-lg-1">UK Postcode</label>
                                <div class="col-lg-2">
                                    <input class="form-control " id="postcode"  name="postcode" placeholder="Postcode"  value="{{ user_info.last_name }}"   type="text" required />
                                </div>
                            </div>
                            <hr>
                            {% if error %}
                                <label class="alert alert-danger">Save Failure,  {{ error }}</label>
                            {% endif %}
                            <div class="form-group">
                                <div class="col-lg-offset-1 col-lg-10">
                                    <button class="btn btn-info" type="submit">Quote</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- /form-panel -->
            </div>
        </div>
    </div>
{% endblock %}
