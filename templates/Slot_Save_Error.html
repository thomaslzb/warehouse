{% extends 'warehouse_base.html' %}
{% load static %}
{% block content %}
    <h1><font color="black"> Save Failure. </font></h1>
    <tr>
        <h3><font color="black">There are some Error: </font></h3>
        <td>
            <font color="Red">
                <td>
                {% if workdate != "" %}<td>Date: {{ workdate }}</td>{% endif %}

                <br>
                <td>
                    {{ ErrorMsg }}
                </td>
                <br>
            </font>

    </tr>
    <br>
    <br>
    <tr>
        <a href="{% url 'slot:slot_list' %}">Back</a>
    </tr>
{% endblock %}
