<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
    {% load static %}
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="">
        <meta name="author" content="">
        <title>DCG Warehouse Sign-In</title>
        <!-- Bootstrap core CSS -->
        <link href="{% static 'bootstrap/css/bootstrap.css' %}" rel="stylesheet" >
        <!-- Custom styles for this template -->
        <link href="{% static 'css/sign-in.css' %}" rel="stylesheet" >
    </head>
    <body class="text-center">
        <form class="form-signin" action="{% url 'users:login' %}" method="post">
            {% csrf_token %}
            <!--
            {% for field in login_form %}
                <div class="fieldWrapper">
                    <label>errors: {{ field.errors }}</label>
                    <label>label_tag: {{ field.label_tag }}{{ field }}</label>
                </div>
            {% endfor %}
            {% if login_form.error %}
                {% for error in field.error %}
                    <div class="alert alert-danger">
                        <strong>{{ error|escape }}</strong>
                    </div>
                {% endfor %}
                {% for error in form.non_field_errot %}
                    <div class="alert alert-danger">
                        <strong>{{ error|escape }}</strong>
                    </div>
                {% endfor %}
            {% endif %}
            -->
            <div>
                <img class="mb-4" src="{% static 'images/uklogo.png' %}" alt="" width="135" height="90">
                <h1 class="h3 mb-3 font-weight-normal">Please sign in</h1>
                <label for="inputEmail" class="sr-only">Email address</label>
                <input type="email" name="username" id="inputusername" class="form-control" placeholder="Email address" required autofocus>
                <label class="sr-only" for="inputPassword" >Password</label>
                <input type="password"  name="password" id="inputPassword" class="form-control" placeholder="Password" required>
            </div>
            <div class="checkbox mb-3">
                <label>
                    <input type="checkbox" value="remember-me"> Remember me
                </label>
            </div>

            <input class="btn btn-lg btn-primary btn-block" type="submit" value="Sign in">
            <p class="mt-5 mb-3 text-muted">&copy; 2020-2021</p>

        </form>


        <!-- Bootstrap core JavaScript
    ================================================== -->
        <!-- Placed at the end of the document so the pages load faster -->
        <script src="{% static 'assets/js/jquery.min.js' %}"></script>
        <script src="{% static 'assets/js/popper.js' %}"></script>
        <script src="{% static 'bootstrap/js/bootstrap.min.js' %}"></script>
    </body>
</html>
